<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATTEO BRUNO | Cinematic Storytelling</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HERO SECTION -->
    <section class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="video-showreel.mp4" type="video/mp4">
        </video>

        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h1 id="matteo-bruno">MATTEO BRUNO</h1>
            <p id="hero-subtitle">Cinematic Storytelling for Brands e Artists</p>

            <a href="#portfolio" class="btn">Guarda i lavori</a>

            <div class="hero-links-text">
                <a href="about.html#about-section">About Me</a>
                <a href="#contact-section">Contact</a> <!-- scrolla alla sezione contatti -->
            </div>
        </div>
    </section>

    <!-- PORTFOLIO -->
    <section id="portfolio" class="portfolio">
        <h2>I miei lavori</h2>
        <div class="grid">
            <div class="item" data-video="video1.mp4">
                <img src="img1.jpg" alt="Lavoro 1">
                <div class="overlay">Commercial</div>
            </div>
            <div class="item" data-video="video2.mp4">
                <img src="img2.jpg" alt="Lavoro 2">
                <div class="overlay">Music Video</div>
            </div>
            <div class="item" data-video="video3.mp4">
                <img src="img3.jpg" alt="Lavoro 3">
                <div class="overlay">Event</div>
            </div>
            <div class="item" data-video="video4.mp4">
                <img src="img4.jpg" alt="Lavoro 4">
                <div class="overlay">Corporate</div>
            </div>
        </div>
    </section>

    <!-- VIDEO POPUP -->
    <div id="video-popup" class="video-popup">
        <div class="video-popup-content">
            <span class="close">&times;</span>
            <video id="popup-video" controls>
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- CONTATTI -->
    <section id="contact-section" class="contact">
        <h2>Contattami</h2>
        <p>Hai un progetto in mente? Parliamone.</p>
        <form>
            <input type="text" placeholder="Nome" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Messaggio" rows="5" required></textarea>
            <button type="submit">Invia</button>
        </form>
    </section>

    <!-- FOOTER -->
    <footer>
        © 2026 MATTEO BRUNO - All Rights Reserved
    </footer>

    <!-- SCRIPT VIDEO POPUP -->
    <script>
        const items = document.querySelectorAll('.portfolio .item');
        const popup = document.getElementById('video-popup');
        const popupVideo = document.getElementById('popup-video');
        const closeBtn = document.querySelector('.video-popup .close');

        items.forEach(item => {
            item.addEventListener('click', () => {
                const videoSrc = item.getAttribute('data-video');
                popupVideo.src = videoSrc;
                popup.style.display = 'flex';
                popupVideo.play();
            });
        });

        closeBtn.addEventListener('click', () => {
            popupVideo.pause();
            popupVideo.src = '';
            popup.style.display = 'none';
        });

        // Chiudi cliccando fuori dal video
        popup.addEventListener('click', (e) => {
            if(e.target === popup) {
                popupVideo.pause();
                popupVideo.src = '';
                popup.style.display = 'none';
            }
        });
    </script>

</body>
</html>
